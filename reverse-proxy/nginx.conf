worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain application/json application/javascript text/css application/xml text/javascript;

  server {
    listen 8080;

    location /api/ {
      proxy_pass http://127.0.0.1:4000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;
      # Allow Telegram Web App to embed the page (required for Mini Apps)
      add_header Content-Security-Policy "frame-ancestors https://web.telegram.org https://telegram.org https://*.telegram.org https://t.me https://*.t.me";
    }
  }
}